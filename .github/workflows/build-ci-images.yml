name: build-ci-images

# SANDBOX SCAFFOLDING (parasxos fork). Builds the token-free open62541 CI
# images and publishes them to ghcr.io/<owner>/quasar-ci:<os>-o6, which ci.yml
# pulls. The uasdk images build FROM these + the Unified Automation SDK fetched
# token-free from a self-hosted UASDK_URL (see build-uasdk below). At landing
# this moves to the images repo.
on:
  push:
    branches: [ci-matrix-reshape]
    paths:
      - '.CI/docker/**'
      - '.github/workflows/build-ci-images.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { tag: alma9-o6,  dockerfile: .CI/docker/Dockerfile.alma9-o6 }
          - { tag: alma10-o6, dockerfile: .CI/docker/Dockerfile.alma10-o6 }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/quasar-ci:${{ matrix.tag }}
          cache-from: type=gha,scope=${{ matrix.tag }}
          cache-to: type=gha,mode=max,scope=${{ matrix.tag }}

  # UASDK images (FROM the o6 images + the pre-built UASDK at /opt/uasdk). UASDK is
  # commercial (no public download). Instead of the CERN ICS token, the SDK comes
  # from your own pipeline: paris-atlas-dcs/uasdk-paris-tools build.yml builds the SDK
  # from private source + patches and publishes static-lib tarballs as GitHub Releases
  # tagged uasdk-<ver>-<arch>-el<N>. This job downloads the matching x86_64 asset using
  # the UASDK_DL_TOKEN secret (a token with Contents:read on uasdk-paris-tools -- an App
  # token or a fine-grained PAT). Enable with repo var HAS_UASDK=true + secret
  # UASDK_DL_TOKEN. Needs x86_64 el9+el10 release assets to exist for each version
  # (dispatch build.yml). PR tier needs 1.8.9; nightly adds 1.6.5 + 2.0.2.
  build-uasdk:
    needs: build
    if: ${{ vars.HAS_UASDK == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        os: [alma9, alma10]
        # PR tier uses 1.8.9 (1.x drop-in); nightly adds 1.6.5 (early 1.x) and 2.0.2 (major:
        # pki+xmlparser merged into uabasecpp, uamodule folded in -- uasdk-eval.cmake is
        # layout-aware). All have x86_64 el9/el10 release assets (build.yml dispatched;
        # 1.6.5 built with the SelectToPoll + poll_fd_size_8192 patch combination).
        version: ['1.6.5', '1.8.9', '2.0.2']
    steps:
      - uses: actions/checkout@v4
      - name: Download pre-built UASDK ${{ matrix.version }} (x86_64, ${{ matrix.os }})
        env:
          GH_TOKEN: ${{ secrets.UASDK_DL_TOKEN }}
        run: |
          el="${{ matrix.os }}"; el="${el#alma}"
          tag="uasdk-${{ matrix.version }}-x86_64-el${el}"
          mkdir -p .CI/docker/_uasdk
          gh release download "$tag" --repo paris-atlas-dcs/uasdk-paris-tools --pattern 'uasdk-*.tar.gz' --dir .CI/docker/_uasdk
          tb="$(ls .CI/docker/_uasdk/uasdk-*.tar.gz | head -1)"
          test -n "$tb" || { echo "no uasdk tarball in release $tag"; exit 1; }
          echo "UASDK_TARBALL=$tb" >> "$GITHUB_ENV"
          echo "downloaded $tb from $tag"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: .CI/docker/Dockerfile.uasdk
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/quasar-ci:${{ matrix.os }}-uasdk-${{ matrix.version }}
          build-args: |
            OWNER=${{ github.repository_owner }}
            OS_TAG=${{ matrix.os }}
            UASDK_TARBALL=${{ env.UASDK_TARBALL }}

  # Native arm64 images on the free GitHub ubuntu-24.04-arm runners (built natively, not via
  # QEMU, so the compat-from-source build is fast). alma9 only -- the representative aarch64
  # set for the nightly arch cells. arm64 Linux is the same gcc/libstdc++ family as x86_64.
  build-arm64:
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        include:
          - { tag: alma9-o6-arm64, dockerfile: .CI/docker/Dockerfile.alma9-o6 }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/quasar-ci:${{ matrix.tag }}
          cache-from: type=gha,scope=${{ matrix.tag }}
          cache-to: type=gha,mode=max,scope=${{ matrix.tag }}

  # arm64 uasdk image: FROM the arm64 o6 image + the aarch64 SDK tarball (1.8.9, el9).
  # 1.8.9 is the PR-default uasdk version; the nightly arm64 cells track it (manifest nightly_arches).
  build-uasdk-arm64:
    needs: build-arm64
    if: ${{ vars.HAS_UASDK == 'true' }}
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        os: [alma9]
        version: ['1.8.9']
    steps:
      - uses: actions/checkout@v4
      - name: Download pre-built UASDK ${{ matrix.version }} (aarch64, ${{ matrix.os }})
        env:
          GH_TOKEN: ${{ secrets.UASDK_DL_TOKEN }}
        run: |
          el="${{ matrix.os }}"; el="${el#alma}"
          tag="uasdk-${{ matrix.version }}-aarch64-el${el}"
          mkdir -p .CI/docker/_uasdk
          gh release download "$tag" --repo paris-atlas-dcs/uasdk-paris-tools --pattern 'uasdk-*.tar.gz' --dir .CI/docker/_uasdk
          tb="$(ls .CI/docker/_uasdk/uasdk-*.tar.gz | head -1)"
          test -n "$tb" || { echo "no uasdk tarball in release $tag"; exit 1; }
          echo "UASDK_TARBALL=$tb" >> "$GITHUB_ENV"
          echo "downloaded $tb from $tag"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: .CI/docker/Dockerfile.uasdk
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/quasar-ci:${{ matrix.os }}-uasdk-${{ matrix.version }}-arm64
          build-args: |
            OWNER=${{ github.repository_owner }}
            OS_TAG=${{ matrix.os }}
            BASE_ARCH_SUFFIX=-arm64
            UASDK_TARBALL=${{ env.UASDK_TARBALL }}

name: build-ci-images

# SANDBOX SCAFFOLDING (parasxos fork). Builds the token-free open62541 CI
# images and publishes them to ghcr.io/<owner>/quasar-ci:<os>-o6, which ci.yml
# pulls. At landing this moves to the images repo; uasdk + windows image builds
# (which need the CERN ICS_REPO_DEPS_TOKEN) are wired there.
on:
  push:
    branches: [ci-matrix-reshape]
    paths:
      - '.CI/docker/**'
      - '.github/workflows/build-ci-images.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { tag: alma9-o6,  dockerfile: .CI/docker/Dockerfile.alma9-o6 }
          - { tag: alma10-o6, dockerfile: .CI/docker/Dockerfile.alma10-o6 }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/quasar-ci:${{ matrix.tag }}
          cache-from: type=gha,scope=${{ matrix.tag }}
          cache-to: type=gha,mode=max,scope=${{ matrix.tag }}

  # Token-gated UASDK images (FROM the o6 images + UASDK at /opt/uasdk). Skipped
  # until the CERN deps token is configured -- add repo secret ICS_REPO_DEPS_TOKEN
  # and repo variable HAS_ICS_TOKEN=true to enable. PR tier needs 1.7.9; nightly
  # adds 1.6.5 + 2.0.2.
  build-uasdk:
    needs: build
    if: ${{ vars.HAS_ICS_TOKEN == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        os: [alma9, alma10]
        version: ['1.7.9', '1.6.5', '2.0.2']
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: .CI/docker/Dockerfile.uasdk
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/quasar-ci:${{ matrix.os }}-uasdk-${{ matrix.version }}
          build-args: |
            OWNER=${{ github.repository_owner }}
            OS_TAG=${{ matrix.os }}
            UASDK_VERSION=${{ matrix.version }}
            ICS_REPO_DEPS_TOKEN=${{ secrets.ICS_REPO_DEPS_TOKEN }}

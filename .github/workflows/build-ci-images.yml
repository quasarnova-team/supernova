name: build-ci-images

# SANDBOX SCAFFOLDING (parasxos fork). Builds the token-free open62541 CI
# images and publishes them to ghcr.io/<owner>/quasar-ci:<os>-o6, which ci.yml
# pulls. The uasdk images build FROM these + the Unified Automation SDK fetched
# token-free from a self-hosted UASDK_URL (see build-uasdk below). At landing
# this moves to the images repo.
on:
  push:
    branches: [ci-matrix-reshape]
    paths:
      - '.CI/docker/**'
      - '.github/workflows/build-ci-images.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { tag: alma9-o6,  dockerfile: .CI/docker/Dockerfile.alma9-o6 }
          - { tag: alma10-o6, dockerfile: .CI/docker/Dockerfile.alma10-o6 }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/quasar-ci:${{ matrix.tag }}
          cache-from: type=gha,scope=${{ matrix.tag }}
          cache-to: type=gha,mode=max,scope=${{ matrix.tag }}

  # Token-free UASDK images (FROM the o6 images + the pre-built UASDK at
  # /opt/uasdk). UASDK is commercial (no public download). Instead of the CERN
  # ICS token, the SDK comes from your own pipeline: paris-atlas-dcs/uasdk-paris-tools
  # build.yml builds the SDK from private source + patches and publishes static-lib
  # tarballs as GitHub Releases tagged uasdk-<ver>-<arch>-el<N>. This job mints a
  # token from that GitHub App and downloads the matching x86_64 release asset.
  # Enable with repo var HAS_UASDK_APP=true + secrets UASDK_APP_ID / UASDK_APP_PRIVATE_KEY
  # (the App must be installed on paris-atlas-dcs with read access to
  # uasdk-paris-tools). Needs x86_64 el9+el10 release assets to exist for each
  # version. PR tier needs 1.7.9; nightly adds 1.6.5 + 2.0.2.
  build-uasdk:
    needs: build
    if: ${{ vars.HAS_UASDK_APP == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        os: [alma9, alma10]
        version: ['1.7.9', '1.6.5', '2.0.2']
    steps:
      - uses: actions/checkout@v4
      - name: Mint a GitHub App token for paris-atlas-dcs/uasdk-paris-tools releases
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.UASDK_APP_ID }}
          private-key: ${{ secrets.UASDK_APP_PRIVATE_KEY }}
          owner: paris-atlas-dcs
          repositories: uasdk-paris-tools
      - name: Download pre-built UASDK ${{ matrix.version }} (x86_64, ${{ matrix.os }})
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          el="${{ matrix.os }}"; el="${el#alma}"
          tag="uasdk-${{ matrix.version }}-x86_64-el${el}"
          mkdir -p .CI/docker/_uasdk
          gh release download "$tag" --repo paris-atlas-dcs/uasdk-paris-tools --pattern 'uasdk-*.tar.gz' --dir .CI/docker/_uasdk
          tb="$(ls .CI/docker/_uasdk/uasdk-*.tar.gz | head -1)"
          test -n "$tb" || { echo "no uasdk tarball in release $tag"; exit 1; }
          echo "UASDK_TARBALL=$tb" >> "$GITHUB_ENV"
          echo "downloaded $tb from $tag"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: .CI/docker/Dockerfile.uasdk
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/quasar-ci:${{ matrix.os }}-uasdk-${{ matrix.version }}
          build-args: |
            OWNER=${{ github.repository_owner }}
            OS_TAG=${{ matrix.os }}
            UASDK_TARBALL=${{ env.UASDK_TARBALL }}

name: CI

on:
  push:
    branches: [master, ci-matrix-reshape]
  pull_request:
    branches: [master]
  schedule:
    - cron: '0 3 * * *'   # nightly: full cube (all tiers x all toolkit versions)
  workflow_dispatch:
    inputs:
      tiers:
        description: 'Comma-separated tiers to run (pr,nightly)'
        default: 'pr,nightly'
      backends:
        description: 'Comma-separated backends (o6,uasdk); empty = repo default'
        default: ''
      os:
        description: 'Comma-separated OS images (alma9,alma10); empty = all'
        default: ''
      versions:
        description: 'Comma-separated uasdk versions (e.g. 1.8.9,2.0.2); empty = all'
        default: ''
      cases:
        description: 'Comma-separated case names (e.g. default_design); empty = all'
        default: ''

permissions:
  contents: read
  packages: read

jobs:

  # ── derive the test matrix from the single-source-of-truth manifest ──────
  # .CI/test_cases/manifest.json -> {case x backend x os x compiler} cells.
  # Optional repo variables narrow the set (e.g. QUASAR_CI_BACKENDS=o6 while
  # the uasdk images are not yet published under this owner).
  matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: gen
        env:
          # push/PR -> fast PR tier; nightly schedule -> full cube; dispatch -> chosen tiers.
          # QUASAR_CI_BACKENDS (repo var) filters backends -- set to "o6" on this fork
          # until the token-gated uasdk images are published.
          QUASAR_CI_BACKENDS: ${{ inputs.backends != '' && inputs.backends || vars.QUASAR_CI_BACKENDS }}
          QUASAR_CI_OS: ${{ inputs.os != '' && inputs.os || vars.QUASAR_CI_OS }}
          QUASAR_CI_VERSIONS: ${{ inputs.versions }}
          QUASAR_CI_CASES: ${{ inputs.cases }}
          QUASAR_CI_TIERS: ${{ github.event_name == 'schedule' && 'pr,nightly' || github.event_name == 'workflow_dispatch' && inputs.tiers || 'pr' }}
        run: |
          echo "matrix=$(.CI/expand_matrix.py)" >> "$GITHUB_OUTPUT"
          .CI/expand_matrix.py --print

  # ── the cube: every test case on every selected backend/os/compiler ──────
  framework-cases:
    needs: matrix
    runs-on: ${{ matrix.runner }}
    name: ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.matrix.outputs.matrix) }}
    container:
      image: ghcr.io/${{ github.repository_owner }}/quasar-ci:${{ matrix.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    env:
      CC: ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - if: matrix.compiler == 'clang'
        run: dnf install -y clang
      - run: .CI/run_test_case.py --case ${{ matrix.case }} --backend ${{ matrix.backend }}
      - if: always()
        run: |
          echo "=== dump.xml DataType serialization sample ==="
          grep -m6 'DataType=' build/bin/dump.xml 2>/dev/null || echo "(no dump / no DataType attr)"
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dump-${{ matrix.label }}
          path: build/bin/dump.xml
          if-no-files-found: ignore

  # ── cross-backend parity (harvested .parity-night mechanic; advisory) ────
  # Diffs each case's o6 dump against its uasdk dump. Activates once uasdk
  # images exist under this owner; on an o6-only run it finds no pairs and
  # passes. Advisory (non-gating) -- some cross-backend diffs are known-benign.
  cross_backend_parity:
    needs: framework-cases
    if: always()
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository_owner }}/quasar-ci:alma9-o6
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/download-artifact@v4
        with:
          path: _dumps
          pattern: dump-*
      - run: .CI/cross_backend_parity.py _dumps

  # ── configure-floor (build system, no compile): stock CMake 3.16 ─────────
  cmake_316_floor:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:20.04
    steps:
      - run: |
          apt-get update -qq
          DEBIAN_FRONTEND=noninteractive apt-get install -y -qq cmake g++ git python3 python3-pip libboost-all-dev libssl-dev libxml2-utils libxml2-dev libxerces-c-dev xsdcxx > /dev/null
          pip3 -q install jinja2 lxml colorama pygit2
          cmake --version | head -1
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - run: |
          COMPAT=$(python3 -c "import json;print(json.load(open('.CI/test_cases/manifest.json'))['backends']['o6']['compat_branch'])")
          ./quasar.py enable_module open62541-compat "$COMPAT"
      - run: ./quasar.py set_build_config open62541_config.cmake
      - run: ./quasar.py prepare_build Release

  # ── framework invariants (hermetic: no backend, no compiler) ─────────────
  framework_invariants:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository_owner }}/quasar-ci:alma9-o6
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - run: python3 .CI/test_upgrade_override.py
      - if: always()
        run: python3 .CI/test_no_spurious_rebuild.py
      - if: always()
        run: python3 .CI/test_no_unbound_delegate.py

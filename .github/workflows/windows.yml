name: CI (Windows Server 2025)

# Windows Server 2025 track (token-free; no UASDK/CERN token).
#   * framework-invariants-windows -- GREEN: hermetic Python codegen tests.
#   * framework-cases-windows -- full o6 oracle: build server + uasak_dump, run,
#     dump address space, compare to the reference NodeSet. The build environment
#     is provisioned in one move by the ./.github/actions/setup-quasar-windows
#     composite action (the Windows analog of the Linux quasar-ci images -- a real
#     container is impractical since it can't reuse the runner's VS). vcpkg deps
#     are cached. A future ws2025-uasdk path (o6 + UASDK from a UASDK_URL secret)
#     reuses the same action to add token-free uasdk Windows coverage.

on:
  push:
    branches: [master, ci-matrix-reshape]
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:

  framework-invariants-windows:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install Python + tooling deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install jinja2 lxml colorama pygit2
          choco install astyle -y --no-progress
        shell: pwsh
      - name: Codegen idempotency / upgrade / unbound-delegate invariants
        run: |
          python .CI/test_upgrade_override.py
          python .CI/test_no_spurious_rebuild.py
          python .CI/test_no_unbound_delegate.py
        shell: pwsh

  framework-cases-windows:
    if: ${{ vars.HAS_WINDOWS == 'true' }}
    runs-on: windows-2025
    strategy:
      fail-fast: false
      matrix:
        case: [default_design]
        backend: [o6]
    env:
      QUASAR_CMAKE_GENERATOR: Ninja
      # vcpkg toolchain so find_package(XercesC/LibXml2/OpenSSL) finds the vcpkg deps
      CMAKE_TOOLCHAIN_FILE: C:\vcpkg\scripts\buildsystems\vcpkg.cmake
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Provision the token-free Windows build environment (MSVC + Boost + XSD + vcpkg)
        uses: ./.github/actions/setup-quasar-windows
      - name: Build o6 server (prepare_build + MSVC compile/link)
        run: |
          python quasar.py enable_module open62541-compat v1.5.7
          # Fetch compat from the parasxos fork branch = v1.5.7 + the MSVC C-flags
          # guard for the bundled open62541 amalgamation.
          Set-Content -Encoding ascii FrameworkInternals\EnabledModules\open62541-compat.url 'https://github.com/parasxos/open62541-compat.git'
          Set-Content -Encoding ascii FrameworkInternals\EnabledModules\open62541-compat.tag 'msvc-cflags-157'
          python quasar.py set_build_config open6_win_configuration.cmake
          python quasar.py build Release
        shell: pwsh
      - name: Build uasak_dump (o6 dump tool, backend-agnostic)
        uses: ./.github/actions/build-uasak-dump
      - name: Windows o6 oracle (run + uasak_dump + NodeSet compare)
        run: |
          $ErrorActionPreference='Stop'
          # uasak_dump.exe is on PATH from its build dir; the vcpkg bin dir carries the
          # runtime DLLs (xerces-c / libxml2 / openssl) that both OpcUaServer.exe and
          # uasak_dump.exe load -- this is the first time either actually runs.
          $env:Path += ";$PWD\uasak\build;C:\vcpkg\installed\x64-windows\bin"
          git clone --depth=1 -b v0.0.5 https://github.com/quasar-team/NodeSetTools.git C:\deps\NodeSetTools
          $env:QUASAR_NODESETTOOLS='C:\deps\NodeSetTools'
          python .CI\travis\server_fixture.py --command_to_run uasak_dump
          if ($LASTEXITCODE -ne 0) { throw "server_fixture / uasak_dump failed (exit $LASTEXITCODE)" }
          if (-not (Test-Path build\bin\dump.xml)) { throw "uasak_dump produced no build\bin\dump.xml" }
          python C:\deps\NodeSetTools\nodeset_compare.py .CI\test_cases\test_default_quasar_design\reference_ns2.xml build\bin\dump.xml --ignore_nodeids StandardMetaData
          if ($LASTEXITCODE -ne 0) { throw "NodeSet compare mismatch (exit $LASTEXITCODE)" }
        shell: pwsh

  # uasdk × Windows. Builds the Unified Automation UA Toolkit x64 from source
  # (the source builds for the active MSVC arch; we reuse the x64 setup-quasar-windows
  # env) and then the uasdk-backed quasar server, and runs the same backend-agnostic
  # uasak_dump oracle. Gated on HAS_WINDOWS_UASDK + the UASDK_DL_TOKEN secret, because
  # the commercial SDK bundle lives in a private paris-atlas-dcs release (downloaded with
  # that token). The SDK source-build step is a first draft -- its first real CI run will
  # surface the SDK's Windows cmake specifics (OpenSSL/LibXml2 discovery, install layout)
  # to iterate, exactly like the o6 chain did.
  framework-cases-windows-uasdk:
    if: ${{ vars.HAS_WINDOWS_UASDK == 'true' }}
    runs-on: windows-2025
    strategy:
      fail-fast: false
      matrix:
        case: [default_design]
        backend: [uasdk]
        sdk_version: ['1.6.5']
    env:
      QUASAR_CMAKE_GENERATOR: Ninja
      CMAKE_TOOLCHAIN_FILE: C:\vcpkg\scripts\buildsystems\vcpkg.cmake
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Provision the token-free Windows build environment (MSVC + Boost + XSD + vcpkg)
        uses: ./.github/actions/setup-quasar-windows
      - name: Build UASDK ${{ matrix.sdk_version }} (x64, from source)
        env:
          GH_TOKEN: ${{ secrets.UASDK_DL_TOKEN }}
        run: |
          $ErrorActionPreference='Stop'
          function chk($w){ if ($LASTEXITCODE -ne 0) { throw "$w failed (exit $LASTEXITCODE)" } }
          gh release download "uasdk-${{ matrix.sdk_version }}-win32-x86-vs2015-src" --repo paris-atlas-dcs/uasdk-paris-tools --pattern '*.exe' --dir C:\uasdk-dl; chk "download SDK bundle"
          $exe = (Get-ChildItem C:\uasdk-dl -Filter '*.exe' | Select-Object -First 1).FullName
          # NSIS self-extractor -> 7z is preinstalled on windows runners.
          7z x -y -oC:\uasdk-src "$exe" > $null; chk "extract SDK"
          $root = (Get-ChildItem C:\uasdk-src -Recurse -Filter CMakeLists.txt | Sort-Object { $_.FullName.Length } | Select-Object -First 1).Directory.FullName
          Write-Host "SDK source root: $root"
          $vi = 'C:\vcpkg\installed\x64-windows'
          # The 1.6.5 bundle's SetThirdPartyPaths only recognizes up to vs2019 and FATALs on
          # the runner's vc143. We follow the quasar-team's Windows approach -- provide x64
          # OpenSSL/libxml2 externally (vcpkg), so the bundle's win32/vs2015 third-party isn't
          # needed -- and patch the unrecognized-VS FATAL to default COMPILER_DIR=vs2019 so
          # configure proceeds.
          $stp = (Get-ChildItem "$root\cmake" -Filter SetThirdPartyPaths.cmake -ErrorAction SilentlyContinue | Select-Object -First 1)
          if ($stp) {
            (Get-Content $stp.FullName -Raw).Replace(
              'message(FATAL_ERROR "The used Visual Studio version was not recognized. "',
              "set(COMPILER_DIR vs2019)`n                message(STATUS `"VS unrecognized; defaulting COMPILER_DIR=vs2019 (external third-party provided). `"") | Set-Content $stp.FullName
            Write-Host "patched SetThirdPartyPaths for vc143"
          }
          # The 1.6.5 SDK declares cmake_minimum_required(VERSION 2.8.x) in every subdir/.cmake,
          # which CMake 4.x rejects ("compatibility with CMake < 3.5 removed"). CMAKE_POLICY_VERSION_MINIMUM=3.5
          # DOES downgrade that to a harmless deprecation warning -- but only if it actually takes
          # effect. The real blocker was the inherited vcpkg CMAKE_TOOLCHAIN_FILE (job env): under
          # CMake 4 the runner's vcpkg.cmake errors at cmake_policy and aborts toolchain processing
          # before the override applies, so every per-file minimum re-surfaced as a hard error. We
          # don't need vcpkg's toolchain here (OpenSSL/libxml2 are passed explicitly below), so we
          # drop it for the SDK configure (just before cmake) -- then the override does its job.
          # Validated locally on the extracted bundle with cmake 4.0.3: 2.8.0 -> deprecation warning,
          # configure proceeds past the whole cmake_minimum_required + FindUaOpenSSL cascade.
          # add_subdirectory(examples) is unconditional, so comment it out -- we don't build examples.
          (Get-Content "$root\CMakeLists.txt" -Raw) -replace 'add_subdirectory\(examples\)', '# add_subdirectory(examples)  # disabled for CI' | Set-Content "$root\CMakeLists.txt"
          Write-Host "disabled examples subdirectory"
          # Build x64 with vcpkg x64 OpenSSL/libxml2 (the team's flags: PKI_WIN32, bcrypt,
          # /FIconio.h). Dynamic vcpkg libs -> their DLLs go on PATH for the oracle run.
          # 1.6.5's FindUaOpenSSL honors explicit OPENSSL_INCLUDE_DIR/SSL_LIBRARY/CRYPTO_LIBRARY/
          # VERSION (NOT OPENSSL_ROOT_DIR, which is the 2.0.2 convention) -- set those so it uses
          # the vcpkg x64 OpenSSL and skips the bundled win64 search. libxml2 likewise via
          # LIBXML2_INCLUDE_DIR/LIBXML2_LIBRARIES.
          # Drop the inherited vcpkg toolchain so CMAKE_POLICY_VERSION_MINIMUM=3.5 is honored (see above);
          # OpenSSL/libxml2 are supplied explicitly via -D and CMAKE_PREFIX_PATH instead.
          Remove-Item Env:CMAKE_TOOLCHAIN_FILE -ErrorAction SilentlyContinue
          cmake -S "$root" -B C:\uasdk-b -G Ninja -DCMAKE_POLICY_VERSION_MINIMUM=3.5 `
            -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF -DBUILD_SHARED_STACK=OFF `
            -DBUILD_EXAMPLES=off -DBUILD_UACLIENTCPP_APP=off -DBUILD_UASERVERCPP_APP=off `
            -DUASTACK_WITH_PKI_WIN32=ON -DUASTACK_CLIENTAPI_ENABLED=ON -DBUILD_UACLIENTCPP=ON `
            -DOPENSSL_INCLUDE_DIR="$vi/include" -DOPENSSL_SSL_LIBRARY="$vi/lib/libssl.lib" -DOPENSSL_CRYPTO_LIBRARY="$vi/lib/libcrypto.lib" -DOPENSSL_VERSION=3.5.5 `
            -DLIBXML2_INCLUDE_DIR="$vi/include/libxml2" -DLIBXML2_LIBRARIES="$vi/lib/libxml2.lib" `
            -DCMAKE_CXX_FLAGS="/FIconio.h" -DCMAKE_EXE_LINKER_FLAGS="/DEFAULTLIB:bcrypt.lib" `
            -DCMAKE_PREFIX_PATH="$vi" -DCMAKE_INSTALL_PREFIX=C:\uasdk; chk "uasdk configure"
          cmake --build C:\uasdk-b; chk "uasdk build"
          cmake --install C:\uasdk-b; chk "uasdk install"
          "OPCUA_TOOLKIT_PATH=C:\uasdk" >> $env:GITHUB_ENV
        shell: pwsh
      - name: Build uasdk server (uasdk_win_configuration + MSVC compile/link)
        run: |
          python quasar.py set_build_config uasdk_win_configuration.cmake
          python quasar.py build Release
        shell: pwsh
      - name: Build uasak_dump (backend-agnostic dump tool)
        uses: ./.github/actions/build-uasak-dump
      - name: Windows uasdk oracle (run + uasak_dump + NodeSet compare)
        run: |
          $ErrorActionPreference='Stop'
          $env:Path += ";$PWD\uasak\build;C:\vcpkg\installed\x64-windows\bin;C:\uasdk\bin"
          git clone --depth=1 -b v0.0.5 https://github.com/quasar-team/NodeSetTools.git C:\deps\NodeSetTools
          $env:QUASAR_NODESETTOOLS='C:\deps\NodeSetTools'
          python .CI\travis\server_fixture.py --command_to_run uasak_dump
          if ($LASTEXITCODE -ne 0) { throw "server_fixture / uasak_dump failed (exit $LASTEXITCODE)" }
          if (-not (Test-Path build\bin\dump.xml)) { throw "uasak_dump produced no build\bin\dump.xml" }
          python C:\deps\NodeSetTools\nodeset_compare.py .CI\test_cases\test_default_quasar_design\reference_ns2.xml build\bin\dump.xml --ignore_nodeids StandardMetaData
          if ($LASTEXITCODE -ne 0) { throw "NodeSet compare mismatch (exit $LASTEXITCODE)" }
        shell: pwsh

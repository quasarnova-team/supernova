name: CI (Windows Server 2025)

# Windows Server 2025 track (token-free; no UASDK/CERN token).
#   * framework-invariants-windows -- GREEN: hermetic Python codegen tests.
#   * framework-cases-windows -- o6 MSVC build. Deps are cached (vcpkg installed
#     dir) so they build once then restore fast. Once this build is green it gets
#     baked into the ws2025-o6 image (Linux-parallel); ws2025-uasdk (o6 + UASDK
#     from a UASDK_URL secret) then adds token-free uasdk Windows coverage.

on:
  push:
    branches: [master, ci-matrix-reshape]
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:

  framework-invariants-windows:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install Python + tooling deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install jinja2 lxml colorama pygit2
          choco install astyle -y --no-progress
        shell: pwsh
      - name: Codegen idempotency / upgrade / unbound-delegate invariants
        run: |
          python .CI/test_upgrade_override.py
          python .CI/test_no_spurious_rebuild.py
          python .CI/test_no_unbound_delegate.py
        shell: pwsh

  framework-cases-windows:
    if: ${{ vars.HAS_WINDOWS == 'true' }}
    runs-on: windows-2025
    strategy:
      fail-fast: false
      matrix:
        case: [default_design]
        backend: [o6]
    env:
      QUASAR_CMAKE_GENERATOR: Ninja
      # vcpkg toolchain so find_package(XercesC/LibXml2/OpenSSL) finds the vcpkg deps
      CMAKE_TOOLCHAIN_FILE: C:\vcpkg\scripts\buildsystems\vcpkg.cmake
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Activate MSVC dev environment (x64) -- provides cl + ninja, no VS-instance detection
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
      - name: Install Python codegen deps (+ astyle for generated-code formatting)
        run: |
          python -m pip install jinja2 lxml colorama pygit2
          choco install astyle -y --no-progress
        shell: pwsh
      - name: Provision Boost (nuget vc141 1.67 libs + full headers)
        run: |
          New-Item -ItemType Directory -Force C:\deps\boost | Out-Null
          $pkgs='boost','boost-vc141','boost_system-vc141','boost_filesystem-vc141','boost_chrono-vc141','boost_date_time-vc141','boost_thread-vc141','boost_program_options-vc141','boost_log-vc141','boost_log_setup-vc141','boost_regex-vc141'
          foreach($p in $pkgs){ nuget install $p -Version 1.67.0 -OutputDirectory C:\deps\boost -ExcludeVersion -NonInteractive }
          # discover the real Boost include root (the dir containing boost\xpressive\xpressive.hpp)
          $xp = Get-ChildItem C:\deps\boost -Recurse -Filter 'xpressive.hpp' -ErrorAction SilentlyContinue | Where-Object { $_.FullName -like '*\boost\xpressive\xpressive.hpp' } | Select-Object -First 1
          if (-not $xp) { throw "boost/xpressive/xpressive.hpp not found under C:\deps\boost (incomplete Boost headers)" }
          $boostInc = Split-Path (Split-Path (Split-Path $xp.FullName))
          Write-Host "Boost include root: $boostInc"
          "BOOST_PATH_HEADERS=$boostInc" >> $env:GITHUB_ENV
          "BOOST_PATH_LIBS=C:\deps\boost" >> $env:GITHUB_ENV
        shell: pwsh
      - name: Provision CodeSynthesis XSD (xsd.exe + libxsd)
        run: |
          Invoke-WebRequest "https://www.codesynthesis.com/download/xsd/4.0/windows/i686/xsd-4.0.0-i686-windows.zip" -OutFile xsd.zip
          Expand-Archive xsd.zip C:\deps\xsd-dl -Force
          $xsdexe=(Get-ChildItem C:\deps\xsd-dl -Recurse -Filter xsd.exe | Select-Object -First 1).FullName
          $libxsd=(Get-ChildItem C:\deps\xsd-dl -Recurse -Directory -Filter libxsd | Select-Object -First 1).FullName
          "CODE_SYNTHESYS_XSD_PATH_HEADERS=$libxsd" >> $env:GITHUB_ENV
          (Split-Path $xsdexe) >> $env:GITHUB_PATH
          Write-Host "xsd.exe=$xsdexe"; Write-Host "libxsd=$libxsd"
        shell: pwsh
      # Cache the built vcpkg deps. Split restore/save so the cache is written
      # right after vcpkg (before the build step that may still fail) -- the
      # combined cache action skips saving on a failed job, which is why earlier
      # runs kept rebuilding for ~30 min.
      - name: Restore vcpkg deps cache
        id: vcpkgcache
        uses: actions/cache/restore@v4
        with:
          path: C:\vcpkg\installed
          key: vcpkg-x64-windows-openssl-libxml2-xerces-v2
      - name: Provision OpenSSL / LibXml2 / Xerces-C (vcpkg)
        run: |
          vcpkg install openssl libxml2 xerces-c --triplet x64-windows
          Write-Host "vcpkg exit code: $LASTEXITCODE"
          $vi = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows"
          if (-not (Test-Path $vi)) { $vi = "C:\vcpkg\installed\x64-windows" }
          Write-Host "vcpkg installed dir: $vi"
          Get-ChildItem "$vi\lib" -Filter '*.lib' -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Name
          $xl = Get-ChildItem "$vi\lib" -Filter 'xerces-c*.lib' -ErrorAction SilentlyContinue | Where-Object Name -notlike '*_3*' | Select-Object -First 1
          if ($xl) { Copy-Item $xl.FullName "$vi\lib\xerces-c_3.lib" -Force }
          if (Test-Path "$vi\lib\libcrypto.lib") { Copy-Item "$vi\lib\libcrypto.lib" "$vi\lib\openssl.lib" -Force }
          "OPENSSL_PATH_HEADERS=$vi\include" >> $env:GITHUB_ENV
          "OPENSSL_PATH_LIBS=$vi\lib" >> $env:GITHUB_ENV
          "XERCESC_PATH_HEADERS=$vi\include" >> $env:GITHUB_ENV
          "XERCESC_PATH_LIBS=$vi\lib" >> $env:GITHUB_ENV
          "LIBXML2_PATH_LIBS=$vi\lib" >> $env:GITHUB_ENV
          exit 0
        shell: pwsh
      - name: Save vcpkg deps cache
        if: steps.vcpkgcache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: C:\vcpkg\installed
          key: vcpkg-x64-windows-openssl-libxml2-xerces-v2
      - name: Build o6 server (prepare_build + MSVC compile/link)
        run: |
          python quasar.py enable_module open62541-compat v1.5.7
          # Fetch compat from the parasxos fork branch = v1.5.7 + the MSVC C-flags
          # guard for the bundled open62541 amalgamation.
          Set-Content -Encoding ascii FrameworkInternals\EnabledModules\open62541-compat.url 'https://github.com/parasxos/open62541-compat.git'
          Set-Content -Encoding ascii FrameworkInternals\EnabledModules\open62541-compat.tag 'msvc-cflags-157'
          python quasar.py set_build_config open6_win_configuration.cmake
          python quasar.py build Release
        shell: pwsh
      - name: Build uasak_dump (+ LogIt + compat) on Windows
        run: |
          $ErrorActionPreference='Stop'
          # LogIt/compat/uasak resolve Boost via find_package(Boost COMPONENTS ...),
          # which is independent of quasar's path-based BoostSetup. Two adjustments
          # are needed for the nuget Boost on this runner:
          #  * Drop the job-inherited vcpkg CMAKE_TOOLCHAIN_FILE -- LogIt's stand-alone
          #    CMake include()s it and then FATALs because it never sets BOOST_LIBS.
          #    Without it, LogIt falls back to its own find_package(Boost) path.
          #  * Steer FindBoost at the nuget vc141 *static* layout: the runner's cl is
          #    vc143, so FindBoost would otherwise hunt for -vc143 libs nuget never ships.
          Remove-Item Env:CMAKE_TOOLCHAIN_FILE -ErrorAction SilentlyContinue
          # Collect the nuget boost component libs into one dir for FindBoost's
          # BOOST_LIBRARYDIR. Materialise the source list with @(...) and exclude the
          # destination, or the lazy -Recurse enumeration walks into libs/ mid-copy and
          # fails ("cannot overwrite the item ... with itself"). nuget ships x32+x64 and
          # release+debug; FindBoost picks -x64 release via the hints below.
          $libDst = 'C:\deps\boost\libs'
          New-Item -ItemType Directory -Force $libDst | Out-Null
          $srcLibs = @(Get-ChildItem C:\deps\boost -Recurse -Filter 'libboost_*.lib' -File | Where-Object { $_.DirectoryName -ne $libDst })
          Write-Host "collecting $($srcLibs.Count) boost libs into $libDst"
          $srcLibs | Copy-Item -Destination $libDst -Force
          $boost = @(
            "-DBOOST_INCLUDEDIR=$env:BOOST_PATH_HEADERS",
            "-DBOOST_LIBRARYDIR=C:\deps\boost\libs",
            "-DBoost_USE_STATIC_LIBS=ON",
            "-DBoost_COMPILER=-vc141",
            "-DBoost_ARCHITECTURE=-x64",
            "-DBoost_NO_BOOST_CMAKE=ON"
          )
          git clone --depth=1 -b windows-msvc https://github.com/parasxos/UaSwissArmyKnife.git uasak
          cd uasak
          New-Item -ItemType Directory -Force build\deploy | Out-Null
          # 1) LogIt v0.1.3 -> static lib + headers into build/deploy/LogIt
          git clone --depth=1 -b v0.1.3 https://github.com/quasar-team/LogIt.git build\work\LogIt
          cmake -S build\work\LogIt -B build\work\LogIt\b -G Ninja -DLOGIT_BUILD_STAND_ALONE=ON -DLOGIT_BUILD_STATIC_LIB=ON @boost -DCMAKE_INSTALL_PREFIX="$PWD\build\deploy\LogIt"
          cmake --build build\work\LogIt\b
          cmake --install build\work\LogIt\b
          # 2) open62541-compat (fork) -> static lib + headers into build/deploy/open62541-compat
          git clone -b msvc-cflags-157 https://github.com/parasxos/open62541-compat.git build\work\compat
          cmake -S build\work\compat -B build\work\compat\b -G Ninja -DSTANDALONE_BUILD=ON -DLOGIT_BUILD_OPTION=LOGIT_AS_EXT_STATIC -DLOGIT_INCLUDE_DIR="$PWD\build\deploy\LogIt\include" -DLOGIT_EXT_LIB_DIR="$PWD\build\deploy\LogIt\lib" @boost -DCMAKE_INSTALL_PREFIX="$PWD\build\deploy\open62541-compat" -DSKIP_TESTS=ON
          cmake --build build\work\compat\b
          cmake --install build\work\compat\b
          # 3) uasak_dump itself. xerces-c is linked by bare name -> put vcpkg lib on LIB.
          $env:LIB = "$env:LIB;C:\vcpkg\installed\x64-windows\lib"
          cmake -S . -B build -G Ninja @boost -DXSD_CXX_COMMAND=xsd
          cmake --build build
          Get-ChildItem -Recurse -Filter 'uasak_dump*' build | Select-Object FullName
        shell: pwsh
      - name: Windows o6 oracle (run + uasak_dump + NodeSet compare)
        run: |
          $ErrorActionPreference='Stop'
          $env:Path += ";$PWD\uasak\build"
          git clone --depth=1 -b v0.0.5 https://github.com/quasar-team/NodeSetTools.git C:\deps\NodeSetTools
          $env:QUASAR_NODESETTOOLS='C:\deps\NodeSetTools'
          python .CI\travis\server_fixture.py --command_to_run uasak_dump
          python C:\deps\NodeSetTools\nodeset_compare.py .CI\test_cases\test_default_quasar_design\reference_ns2.xml build\bin\dump.xml --ignore_nodeids StandardMetaData
        shell: pwsh

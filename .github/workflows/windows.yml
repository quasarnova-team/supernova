name: CI (Windows Server 2025)

# Windows Server 2025 track. Two lanes:
#   * framework-invariants-windows  -- RUNS NOW, token-free: the hermetic Python
#     codegen invariants on a real windows-2025 runner. Proves quasar's code
#     generation layer is Windows-clean (no POSIX-only path/IO assumptions).
#   * framework-cases-windows       -- GATED bring-up: full MSVC build of the o6
#     server. Needs the Windows dependency stack (Boost/OpenSSL/Xerces/XSD/
#     libxml2 from the quasar-team/images w2025 scripts) and is enabled with
#     repo var HAS_WINDOWS=true. uasdk on Windows additionally needs the CERN
#     ICS_REPO_DEPS_TOKEN (commercial toolkit). open6_win_configuration.cmake is
#     the o6 Windows build config (nuget boost-vc141 1.67 layout + *_PATH_* env).

on:
  push:
    branches: [master, ci-matrix-reshape]
  workflow_dispatch:
    inputs:
      backends:
        description: 'Backends for the gated build lane (o6 token-free; uasdk needs the token)'
        default: 'o6'

permissions:
  contents: read
  packages: read

jobs:

  # Token-free: the Python codegen / framework-invariant tests on Windows.
  framework-invariants-windows:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install Python + tooling deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install jinja2 lxml colorama pygit2
          choco install astyle -y --no-progress
        shell: pwsh
      - name: Codegen idempotency / upgrade / unbound-delegate invariants
        run: |
          python .CI/test_upgrade_override.py
          python .CI/test_no_spurious_rebuild.py
          python .CI/test_no_unbound_delegate.py
        shell: pwsh

  # Gated bring-up: full MSVC build of the o6 server (needs the Windows dep
  # bundle). Off until HAS_WINDOWS=true; o6 is token-free, uasdk needs the token.
  framework-cases-windows:
    if: ${{ vars.HAS_WINDOWS == 'true' }}
    runs-on: windows-2025
    strategy:
      fail-fast: false
      matrix:
        case: [default_design, methods]
        backend: [o6]
    env:
      QUASAR_NODESETTOOLS: C:\quasar-deps\NodeSetTools
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      # VALIDATE: restore the prebuilt w2025 dependency bundle into C:\quasar-deps
      # and export the *_PATH_HEADERS/_LIBS env vars open6_win_configuration.cmake
      # expects (BOOST_PATH_*, CODE_SYNTHESYS_XSD_PATH_HEADERS, OPENSSL_PATH_*,
      # XERCESC_PATH_*, LIBXML2_PATH_LIBS). Placeholder while the bundle is built.
      - name: Provision Windows dependencies (bundle restore)
        run: |
          Write-Host "TODO: restore w2025 dep bundle and export the *_PATH_* env vars"
        shell: pwsh
      - name: Build + evaluate case (cross-platform driver)
        run: python .CI/run_test_case.py --case ${{ matrix.case }} --backend ${{ matrix.backend }}
        shell: pwsh
